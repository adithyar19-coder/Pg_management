<div class="page-header">
  <div><h1>Announcements</h1><p>Broadcast updates to your tenants</p></div>
  <button class="btn btn-primary" (click)="showModal=true;form={title:'',message:'',pgId:'',priority:'NORMAL'}">+ New Announcement</button>
</div>

<div *ngIf="loading" style="text-align:center;padding:60px"><div class="spinner spinner-dark"></div></div>

<div *ngIf="!loading && announcements.length===0" class="empty-state card" style="padding:60px">
  <div class="empty-icon">📢</div>
  <div class="empty-title">No announcements yet</div>
  <div class="empty-text">Post your first announcement to keep tenants informed</div>
  <button class="btn btn-primary" style="margin-top:16px" (click)="showModal=true">+ Create Announcement</button>
</div>

<div style="display:flex;flex-direction:column;gap:14px" *ngIf="!loading && announcements.length>0">
  <div class="card" *ngFor="let a of announcements">
    <div style="padding:16px 20px;display:flex;align-items:flex-start;gap:14px">
      <div style="font-size:2rem;line-height:1">{{ priorityIcon(a.priority) }}</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap">
          <span style="font-weight:700;font-size:1rem;color:var(--gray-900)">{{ a.title }}</span>
          <span class="badge" [ngClass]="priorityClass(a.priority)">{{ a.priority }}</span>
          <span *ngIf="a.pg" class="badge badge-purple">{{ a.pg.name }}</span>
          <span *ngIf="!a.pg" class="badge badge-blue">All PGs</span>
        </div>
        <p style="color:var(--gray-600);font-size:0.875rem;margin:0 0 10px">{{ a.message }}</p>
        <span style="font-size:0.75rem;color:var(--gray-400)">📅 {{ a.createdAt | date:'dd MMM yyyy, h:mm a' }}</span>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" *ngIf="showModal" (click)="showModal=false">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title">📢 New Announcement</span>
      <button class="modal-close" (click)="showModal=false">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input class="form-control" [(ngModel)]="form.title" placeholder="e.g. Water supply disruption">
      </div>
      <div class="form-group">
        <label class="form-label">Message *</label>
        <textarea class="form-control" [(ngModel)]="form.message" rows="4" placeholder="Write your announcement here..."></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="form-label">Target PG</label>
          <select class="form-control" [(ngModel)]="form.pgId">
            <option value="">All PGs</option>
            <option *ngFor="let pg of pgs" [value]="pg.id">{{ pg.name }}</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select class="form-control" [(ngModel)]="form.priority">
            <option *ngFor="let p of priorities" [value]="p">{{ p }}</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" (click)="showModal=false">Cancel</button>
      <button class="btn btn-primary" (click)="save()" [disabled]="saving || !form.title || !form.message">
        <span *ngIf="saving" class="spinner"></span>
        {{ saving ? 'Posting...' : '📢 Post Announcement' }}
      </button>
    </div>
  </div>
</div>
