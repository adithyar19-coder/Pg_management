<div class="page-header">
  <div>
    <h1>Notifications</h1>
    <p>Stay updated on your room, rent, and requests</p>
  </div>
  <button *ngIf="unreadCount > 0" class="btn btn-outline" (click)="markAllRead()">
    ✓ Mark all as read ({{ unreadCount }})
  </button>
</div>

<div *ngIf="loading" style="text-align:center;padding:60px"><div class="spinner spinner-dark"></div></div>

<div *ngIf="!loading && notifications.length===0" class="empty-state card" style="padding:60px">
  <div class="empty-icon">🔔</div>
  <div class="empty-title">No notifications yet</div>
  <div class="empty-text">You'll be notified about rent, complaints, and announcements here</div>
</div>

<div style="display:flex;flex-direction:column;gap:10px" *ngIf="!loading && notifications.length>0">
  <div *ngFor="let n of notifications"
       (click)="markRead(n)"
       [style.background]="n.isRead ? 'var(--white)' : 'var(--primary-light)'"
       [style.border]="n.isRead ? '1px solid var(--gray-200)' : '1px solid #c7d2fe'"
       style="border-radius:var(--radius-lg);padding:16px 20px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:14px;box-shadow:var(--shadow-sm)"
       class="notif-row">

    <!-- Icon -->
    <div [style.background]="typeBg(n.type)"
         style="width:42px;height:42px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0">
      {{ typeIcon(n.type) }}
    </div>

    <!-- Content -->
    <div style="flex:1">
      <p style="margin:0 0 4px;color:var(--gray-800);font-size:0.9rem;line-height:1.5"
         [style.font-weight]="n.isRead ? '400' : '600'">
        {{ n.message }}
      </p>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:0.75rem;color:var(--gray-400)">📅 {{ n.createdAt | date:'dd MMM yyyy, h:mm a' }}</span>
        <span *ngIf="n.type" class="badge badge-gray" style="font-size:0.65rem">{{ n.type }}</span>
      </div>
    </div>

    <!-- Unread dot -->
    <div *ngIf="!n.isRead"
         style="width:10px;height:10px;background:var(--primary);border-radius:50%;flex-shrink:0;margin-top:4px">
    </div>
    <div *ngIf="n.isRead"
         style="width:10px;height:10px;flex-shrink:0">
    </div>
  </div>
</div>
