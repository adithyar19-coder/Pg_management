<div class="page-header">
  <div><h1>Announcements</h1><p>Updates from your property owner</p></div>
</div>

<div *ngIf="loading" style="text-align:center;padding:60px"><div class="spinner spinner-dark"></div></div>

<div *ngIf="!loading && announcements.length===0" class="empty-state card" style="padding:60px">
  <div class="empty-icon">📢</div>
  <div class="empty-title">No announcements yet</div>
  <div class="empty-text">Your owner hasn't posted any announcements. Check back later.</div>
</div>

<div style="display:flex;flex-direction:column;gap:14px" *ngIf="!loading && announcements.length>0">
  <div *ngFor="let a of announcements"
       [style.background]="priorityBg(a.priority)"
       [style.border-left]="'4px solid ' + priorityBorder(a.priority)"
       style="border-radius:var(--radius-lg);padding:20px 24px;box-shadow:var(--shadow)">
    <div style="display:flex;align-items:flex-start;gap:14px">
      <div style="font-size:2rem;line-height:1;flex-shrink:0">{{ priorityIcon(a.priority) }}</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap">
          <h3 style="margin:0;font-size:1rem">{{ a.title }}</h3>
          <span class="badge" [ngClass]="priorityClass(a.priority)">{{ a.priority }}</span>
          <span *ngIf="a.pg" class="badge badge-purple" style="font-size:0.7rem">{{ a.pg.name }}</span>
        </div>
        <p style="color:var(--gray-700);font-size:0.9rem;margin:0 0 12px;line-height:1.6">{{ a.message }}</p>
        <div style="display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--gray-400)">
          <span>📅</span>
          <span>{{ a.createdAt | date:'EEEE, dd MMM yyyy · h:mm a' }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
