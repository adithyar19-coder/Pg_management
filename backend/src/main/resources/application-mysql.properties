# ─────────────────────────────────────────────────────────────────────
# MySQL profile — used when spring.profiles.active=mysql
# Requires MySQL80 service running on localhost:3306.
# Activate with: change spring.profiles.active=mysql in application.properties
# ─────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/pg_management
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# Hibernate 6 auto-detects the dialect; leave explicit only if you hit issues.
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
