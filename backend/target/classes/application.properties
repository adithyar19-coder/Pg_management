spring.application.name=pg-management

# ─────────────────────────────────────────────────────────────────────
# DB profile selector — change to "mysql" when IT unblocks MySQL80.
# Each profile's DB config lives in application-<profile>.properties.
# Override without editing this file:
#     -Dspring.profiles.active=mysql           (JVM arg)
#     SPRING_PROFILES_ACTIVE=mysql             (env var)
# ─────────────────────────────────────────────────────────────────────
spring.profiles.active=h2

# JPA / Hibernate (shared)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=mysupersecuresecretkey1234567890abcd
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
upload.dir=./uploads

# Server
server.port=8082

# Jackson
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false
