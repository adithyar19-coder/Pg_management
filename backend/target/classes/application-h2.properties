# ─────────────────────────────────────────────────────────────────────
# H2 profile — runs entirely inside the Spring Boot JVM.
# No admin rights, no Windows service, no port 3306 needed.
# Data persists to ./data/pg-h2.mv.db (survives restarts).
# ─────────────────────────────────────────────────────────────────────
# NON_KEYWORDS frees up reserved words (MONTH, USER, VALUE, KEY, TYPE) so they can be used as column names.
# MODE=MySQL enables MySQL compatibility layer for SQL dialect consistency.
spring.datasource.url=jdbc:h2:file:./data/pg-h2;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=MONTH,USER,VALUE,KEY,TYPE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 web console — browse your tables at http://localhost:8082/h2-console
# JDBC URL to paste there: jdbc:h2:file:./data/pg-h2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
